<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plano Expirado - PayPro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }
        .icon {
            width: 80px;
            height: 80px;
            background: #fee2e2;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        .icon i {
            font-size: 40px;
            color: #ef4444;
        }
        h2 {
            font-size: 24px;
            color: #1e293b;
            margin-bottom: 15px;
        }
        p {
            color: #64748b;
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 25px;
        }
        .btn-whatsapp {
            background: #25D366;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            width: 100%;
            margin-bottom: 15px;
        }
        .btn-whatsapp:hover {
            background: #128C7E;
        }
        .btn-group {
            background: #e2e8f0;
            color: #1e293b;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            width: 100%;
        }
        .btn-group:hover {
            background: #cbd5e1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="icon">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            
            <h2>Plano Expirado</h2>
            
            <p>O seu plano da PayPro expirou. Para continuar usando o serviço, é preciso renovar.</p>
            
            <!-- LINK DO GRUPO WHATSAPP -->
            <a href="https://chat.whatsapp.com/BxcGx0iHq7e61G7YlW0smJ" target="_blank" class="btn-whatsapp">
                <i class="fab fa-whatsapp"></i> Pedir renovação no grupo
            </a>
            
            <!-- LINK PARA SUPORTE DIRETO (opcional) -->
            <a href="https://wa.me/258858112264" target="_blank" class="btn-group">
                <i class="fab fa-whatsapp"></i> Falar com suporte
            </a>
        </div>
    </div>
</body>
</html>
